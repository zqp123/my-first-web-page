<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联系表单</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .form-container {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      padding: 32px;
      width: 100%;
      max-width: 420px;
    }

    h2 {
      margin-bottom: 24px;
      color: #1a1a1a;
      font-size: 22px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 500;
      color: #333;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #f8fafc;
    }

    input:focus,
    textarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      width: 100%;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      background: #3b82f6;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>联系我们</h2>
    <form action="#" method="post">
      <div class="form-group">
        <label for="name">姓名</label>
        <input type="text" id="name" name="name" placeholder="请输入您的姓名" required>
      </div>

      <div class="form-group">
        <label for="email">邮箱</label>
        <input type="email" id="email" name="email" placeholder="请输入您的邮箱地址" required>
      </div>

      <div class="form-group">
        <label for="message">留言</label>
        <textarea id="message" name="message" placeholder="请输入您的留言内容" required></textarea>
      </div>

      <button type="submit">提交</button>
    </form>
  </div>
</body>
</html>
